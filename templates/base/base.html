<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LFQ</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}
    {% endblock %}

</head>

<body>

  <div class="layout">
  <!-- Overlay -->

    <!-- Menú Lateral -->
    <aside class="sidebar" id="sidebar">

      <!-- Lineas Quindío -->
      <div class="sidebar-stripe">
        <span class="stripe-green"></span>
        <span class="stripe-yellow"></span>
        <span class="stripe-purple"></span>
      </div>

      <!-- Logo -->
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div>
          <div class="logo-title">Lifútbol Quindío</div>
          <div class="logo-subtitle">Quindio, Colombia</div>
        </div>
      </div>

      <!-- Menú de Navegación -->
      <nav class="sidebar-nav">
        <p class="sidebar-nav-label">Menu</p>
        <ul>
          <li>
            <a href="{% url 'home' %}" class="{% if page == 'home' %}active{% endif %}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Inicio
            </a>
          </li>
          <li>
            <a href="{% url 'teams' %}" class="{% if page == 'teams' %}active{% endif %}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Equipos
            </a>
          </li>
          <li> 
            <a href=" {% url 'teams_create' %}" class="{% if page == 'teams_create' %}active{% endif %}">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              Crear Equipo
            </a>
          </li>
        </ul>
      </nav>

      <!-- Footer -->
      <div class="sidebar-footer">
        <div class="footer-dots">
          <div class="footer-dot dot-green"></div>
          <div class="footer-dot dot-yellow"></div>
          <div class="footer-dot dot-purple"></div>
        </div>
        <p>Liga de Futbol del Quindio</p>
        <p>Temporada 2026</p>
      </div>
    </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="content-wrapper">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

</body>
</html>
