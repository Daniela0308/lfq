<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚽ Fixture Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #eee; min-height: 100vh; }
    nav {
      background: #1a3a5c; padding: 14px 30px;
      display: flex; gap: 20px; align-items: center;
    }
    nav a { color: #7ec8e3; text-decoration: none; font-weight: bold; }
    nav a:hover { color: white; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 24px; color: #7ec8e3; }
    h2 { font-size: 1.3rem; margin-bottom: 16px; color: #aad4e8; }
    .btn {
      display: inline-block; padding: 10px 22px; border-radius: 8px;
      text-decoration: none; font-weight: bold; cursor: pointer;
      border: none; font-size: 1rem; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #2d6a9f; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger  { background: #c0392b; color: white; }
  </style>
</head>
<body>
  <nav>
    <span>⚽ Fixture Generator</span>
    <a href="{% url 'lista_equipos' %}">Equipos</a>
    <a href="{% url 'crear_torneo' %}">Nuevo Torneo</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
